apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.appName }}-{{ .Values.service }}-{{ .Values.environment }}-hpa
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  minReplicas: 1
  maxReplicas: 6
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{- if eq .Values.environment "dev" -}}
    {{ .Values.appName }}-{{ .Values.service }}-{{ .Values.environment }}-deployment
    {{- else -}}
    {{ .Values.appName }}-{{ .Values.service }}-{{ .Values.environment }}-deployment-primary
    {{- end }}
  targetCPUUtilizationPercentage: 80
  # targetCPUUtilizationPercentage: 1 # Uncomment this and comment the line above to test the Horizontal Pod Autoscaler