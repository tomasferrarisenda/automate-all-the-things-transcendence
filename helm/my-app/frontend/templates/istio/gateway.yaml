apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: {{ .Values.appName }}-{{ .Values.service }}-{{ .Values.environment }}-gateway
  {{- if eq .Values.environment "prod" }} # HTTPS only in prod
  annotations:
    cert-manager.io/cluster-issuer: staging-cluster-issuer
  {{- end }}
spec:
  {{- if ne .Values.environment "prod" }} 
  selector:
    istio: gateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - {{ .Values.environment }}.{{ .Values.host }}
  {{- end }}
  {{- if eq .Values.environment "prod" }} 
  # gatewayClassName: foo
  listeners:
    - hostname: {{ .Values.host }}
      port: 443
      protocol: HTTPS
      routes:
        kind: HTTPRoute
        selector:
          matchLabels:
            # app: foo
            istio: gateway
      tls:
        mode: Terminate
        certificateRef:
          name: example-com-tls
          kind: Secret
          group: core
  {{- end }}