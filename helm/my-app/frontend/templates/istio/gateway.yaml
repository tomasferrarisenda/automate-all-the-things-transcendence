apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: {{ .Values.appName }}-{{ .Values.service }}-{{ .Values.environment }}-gateway
spec:
  selector:
    istio: gateway
  servers:
    - port:
        number: {{ .Values.port }}
        name: https
        protocol: HTTPS
        # name: http
        # protocol: HTTP
      hosts:
        - {{ .Values.host }}
      tls:
        mode: SIMPLE
        credentialName: wildcard-tferrari-com-crt # This should match the Certificate secretName
