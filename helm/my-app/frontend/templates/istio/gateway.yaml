apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: {{ .Values.appName }}-{{ .Values.service }}-{{ .Values.environment }}-gateway
  name: {{ .Values.appName }}-{{ .Values.service }}-prod-gateway
spec:
  selector:
    istio: gateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - {{ .Values.host }} # Istio Gateway service external IP
      tls:
        httpsRedirect: true
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        - {{ .Values.host }}
      tls:
        mode: SIMPLE
        credentialName: {{ .Values.appName }}-com-crt # This should match the Certificate secretName










