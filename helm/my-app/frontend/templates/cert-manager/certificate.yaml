# STAGING
{{- if eq .Values.environment "prod" }} # Only deploy in prod
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.appName }}-com
  namespace: {{ .Values.certificateNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  secretName: {{ .Values.appName }}-com-crt
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  usages:
    - server auth
    - client auth
  dnsNames:
    - {{ .Values.host }}
  issuerRef:
    name: staging-cluster-issuer
    kind: ClusterIssuer
    group: cert-manager.io
{{- end }}


