apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.appName }}-com
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  # name: {{ .Values.appName }}-{{ .Values.environment }}-tferrari-com
  namespace: {{ .Values.certificateNamespace }}
spec:
  secretName: {{ .Values.appName }}-com-crt
  # secretName: {{ .Values.appName }}-{{ .Values.environment }}-tferrari-com-crt
  # commonName: "*.{{ .Values.host }}"
  dnsNames: 
    - {{ .Values.host }}
    # - {{ .Values.appName }}-{{ .Values.service }}-{{ .Values.environment }}.tferrari.com
  issuerRef:
    # Let’s Encrypt has a strict rate limit on certificates issued, so we use the Staging Let’s Encrypt server for testing, and then we switch to the Production Let’s Encrypt server.
    # name: staging-cluster-issuer # Comment when switching to Production
    name: production-cluster-issuer # Uncomment when switching to Production
    kind: ClusterIssuer
    group: cert-manager.io

