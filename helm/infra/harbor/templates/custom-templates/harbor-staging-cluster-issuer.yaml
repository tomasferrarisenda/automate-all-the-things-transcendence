apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: harbor-staging-cluster-issuer
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  acme:
    # Let’s Encrypt has a strict rate limit on certificates issued, so we use the Staging Let’s Encrypt server for testing, and then we switch to the Production Let’s Encrypt server.
    # Production Let’s Encrypt server
    server: https://acme-staging-v02.api.letsencrypt.org/directory # Uncomment when switching to Production
    privateKeySecretRef:
      # Reference to Production secret
      name: harbor-staging-cluster-issuer
    solvers:
      - http01:
          ingress:
            class: alb

