# Default user is "admin"
harborAdminPassword: automate-all-the-things

expose:
  # Set how to expose the service. Set the type as "ingress", "clusterIP", "nodePort" or "loadBalancer"
  # and fill the information in the corresponding section
  type: ingress

  tls:
    # Enable TLS or not.
    # Delete the "ssl-redirect" annotations in "expose.ingress.annotations" when TLS is disabled and "expose.type" is "ingress"
    # Note: if the "expose.type" is "ingress" and TLS is disabled,
    # the port must be included in the command when pulling/pushing images.
    # Refer to https://github.com/goharbor/harbor/issues/5291 for details.
    enabled: false

  ingress:

    hosts:
      core: ""
    
    # set to the type of ingress controller if it has specific requirements.
    # leave as `default` for most ingress controllers.
    # set to `gce` if using the GCE ingress controller
    # set to `ncp` if using the NCP (NSX-T Container Plugin) ingress controller
    # set to `alb` if using the ALB ingress controller
    # set to `f5-bigip` if using the F5 BIG-IP ingress controller
    controller: alb

    annotations: {
      kubernetes.io/ingress.class: alb,
      alb.ingress.kubernetes.io/scheme: internet-facing,
      alb.ingress.kubernetes.io/target-type: ip,
      alb.ingress.kubernetes.io/healthcheck-protocol: HTTP,
      alb.ingress.kubernetes.io/healthcheck-port: traffic-port,
      alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15',
      alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5',
      alb.ingress.kubernetes.io/success-codes: '200',
      alb.ingress.kubernetes.io/healthy-threshold-count: '2',
      alb.ingress.kubernetes.io/unhealthy-threshold-count: '2',
      
      # Delete the "ssl-redirect" annotations in "expose.ingress.annotations" when TLS is disabled and "expose.type" is "ingress"
      ingress.kubernetes.io/ssl-redirect: "false"
    } 

externalURL: http://k8s-registry-harborin-3fc40329a9-2086369037.us-east-2.elb.amazonaws.com # This value was modified by the harbor-setup pipeline
